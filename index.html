<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Labyrinthe 3D</title>
  <link rel="stylesheet" href="styles.css?v=firebase5">
</head>
<body>
  <main class="game-shell">
    <canvas id="view" aria-label="Labyrinthe en 3D"></canvas>

    <section class="hud" aria-label="Tableau de bord">
      <div class="status-panel">
        <div class="game-title">Labyrinthe</div>
        <div class="stats">
          <span>Pas <strong id="steps">0</strong></span>
          <span>Temps <strong id="time">00:00</strong></span>
          <span>Niv <strong id="level-state">1</strong></span>
          <span>Cle <strong id="key-state">Non</strong></span>
          <span id="compass-panel" hidden>Dir <strong id="direction-state">--</strong></span>
          <span id="state">Entree</span>
          <button id="network-open" class="network-chip" type="button" aria-label="Partie en ligne">
            <span id="network-dot" class="network-dot" aria-hidden="true"></span>
            <strong id="network-state">Solo</strong>
          </button>
        </div>
      </div>

      <div class="side-panel">
        <canvas id="minimap" aria-label="Carte du labyrinthe"></canvas>
        <button id="restart" class="icon-button" type="button" aria-label="Recommencer" title="Recommencer">R</button>
      </div>
    </section>

    <nav class="touch-controls" aria-label="Controle tactile">
      <button data-key="ArrowUp" class="touch-button touch-up" type="button" aria-label="Avancer">&uarr;</button>
      <button data-key="ArrowLeft" class="touch-button touch-left" type="button" aria-label="Tourner a gauche">&larr;</button>
      <button data-key="ArrowRight" class="touch-button touch-right" type="button" aria-label="Tourner a droite">&rarr;</button>
      <button data-key="ArrowDown" class="touch-button touch-down" type="button" aria-label="Reculer">&darr;</button>
    </nav>

    <div id="win" class="win-banner" hidden>
      <span>Sortie atteinte</span>
      <button id="play-again" type="button">Rejouer</button>
    </div>

    <div id="network-dialog" class="network-dialog" hidden>
      <section class="network-modal" role="dialog" aria-modal="true" aria-labelledby="network-title">
        <header class="network-header">
          <h2 id="network-title">Partie en ligne</h2>
          <button id="network-close" class="network-close" type="button" aria-label="Fermer" title="Fermer">&times;</button>
        </header>

        <div id="network-lobby">
          <button id="create-room" class="network-primary" type="button">Creer une partie</button>
          <div class="network-divider"><span>ou</span></div>
          <form id="join-room-form" class="join-room-form">
            <label for="room-code-input">Code du salon</label>
            <div class="join-room-row">
              <input id="room-code-input" type="text" maxlength="6" autocomplete="off" spellcheck="false" placeholder="ABC234">
              <button class="network-primary" type="submit">Rejoindre</button>
            </div>
          </form>
        </div>

        <div id="network-room" class="network-room" hidden>
          <span class="network-room-label">Code du salon</span>
          <strong id="room-code" class="room-code">------</strong>
          <span id="room-player-count" class="room-player-count">1 joueur sur 2</span>
          <div class="network-room-actions">
            <button id="copy-room-code" class="network-secondary" type="button">Copier le code</button>
            <button id="leave-room" class="network-secondary network-danger" type="button">Quitter</button>
          </div>
        </div>

        <p id="network-message" class="network-message" role="status" aria-live="polite">Mode solo</p>
      </section>
    </div>
  </main>

  <script src="game.js?v=firebase5"></script>
  <script type="module" src="network.js?v=firebase5"></script>
</body>
</html>
